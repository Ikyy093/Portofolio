<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="icon" href="/favicon.ico">
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,Helvetica,sans-serif;
        }

        body{
            background:#f4f7fb;
        }

        .container{
            width:90%;
            max-width:900px;
            margin:40px auto;
        }

        h1{
            text-align:center;
            margin-bottom:10px;
        }

        p{
            text-align:center;
            color:#666;
            margin-bottom:30px;
        }

        .card{
            background:#fff;
            padding:25px;
            border-radius:12px;
            box-shadow:0 4px 10px rgba(0,0,0,.08);
            margin-bottom:25px;
        }

        .card h2{
            margin-bottom:8px;
        }

        .card p{
            text-align:left;
            margin-bottom:15px;
        }

        .btn{
            display:inline-block;
            background:#2563eb;
            color:white;
            text-decoration:none;
            padding:12px 28px;
            border-radius:8px;
            font-weight:bold;
            transition:.3s;
        }

        .btn:hover{
            background:#1d4ed8;
        }

        .logout{
            margin-top:30px;
            text-align:center;
        }

        .logout a{
            color:red;
            text-decoration:none;
            font-weight:bold;
        }

        .stats{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
            gap:20px;
            margin-bottom:30px;
        }

        .stat-card{
            background:#2563eb;
            color:white;
            padding:25px;
            border-radius:12px;
            text-align:center;
            box-shadow:0 6px 15px rgba(0,0,0,.12);
        }

        .stat-card h2{
            font-size:38px;
            margin-bottom:8px;
        }

        .stat-card span{
            font-size:16px;
            opacity:.9;
        }

        .logout-btn{
            background:#dc2626;
            color:white;
            border:none;
            padding:12px 30px;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        .logout-btn:hover{
            background:#b91c1c;
        }

        .dashboard-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:30px;
        }

        .dashboard-header h1{
            margin-bottom:10px;
            text-align:left;
        }

        .dashboard-header p{
            margin:0;
            text-align:left;
        }
    </style>

</head>

<body>

<div class="container">

    <div class="dashboard-header">

    <div>
        <h1 id="welcomeText">Selamat Datang 👋</h1>
        <p>Kelola seluruh data Portofolio Website.</p>
    </div>

    <button id="logoutBtn" class="logout-btn">
        Logout
    </button>

    </div>
    <div class="stats">

        <div class="stat-card">
            <h2 id="skillCount">0</h2>
            <span>Skills</span>
        </div>

        <div class="stat-card">
            <h2 id="projectCount">0</h2>
            <span>Projects</span>
        </div>

        <div class="stat-card">
            <h2 id="experienceCount">0</h2>
            <span>Experience</span>
        </div>

    </div>

    <div class="card">

        <h2>👤 Profile</h2>

        <p>Edit informasi profil.</p>

        <a href="profiles.html" class="btn">
            Kelola
        </a>

    </div>

    <div class="card">

        <h2>💻 Skills</h2>

        <p>Tambah dan edit skill.</p>

        <a href="skills.html" class="btn">
            Kelola
        </a>

    </div>

    <div class="card">

        <h2>📚 Experience</h2>

        <p>Tambah pengalaman.</p>

        <a href="experience.html" class="btn">
            Kelola
        </a>

    </div>

    <div class="card">

        <h2>🚀 Projects</h2>

        <p>Tambah project.</p>

        <a href="projects.html" class="btn">
            Kelola
        </a>

    </div>


</div>


<script src="js/dashboard.js"></script>

</body>
</html>
