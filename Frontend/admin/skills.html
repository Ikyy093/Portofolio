<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Kelola Skills</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fb;
}

.container{
width:90%;
max-width:900px;
margin:40px auto;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,.08);
}

h1{
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;
}

.actions{
display:flex;
justify-content:space-between;
margin-top:20px;
padding-top:20px;
border-top:1px solid #eee;
}

.btn-back,
.btn-save{
padding:12px 24px;
border:none;
border-radius:8px;
cursor:pointer;
text-decoration:none;
font-weight:bold;
}

.btn-back{
background:#6b7280;
color:white;
}

.btn-save{
background:#2563eb;
color:white;
}

table{
width:100%;
border-collapse:collapse;
margin-top:30px;
}

table th,
table td{
padding:12px;
border:1px solid #ddd;
text-align:left;
}

table th{
background:#2563eb;
color:white;
}

#message{
margin-top:20px;
padding:12px;
border-radius:8px;
background:#dcfce7;
color:#166534;
font-weight:bold;
display:none;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>Kelola Skills</h1>

<form id="skillForm">

<input
type="hidden"
id="skill_id">

<input
type="text"
id="nama_skill"
placeholder="Nama Skill">

<input
type="text"
id="icon_class"
placeholder="Icon Class (contoh: fa-brands fa-python)">

<div class="actions">

<a href="/admin/dashboard.html" class="btn-back">
 Kembali
</a>

<button
type="submit"
class="btn-save">
Simpan
</button>

</div>

</form>

<table>

<thead>

<tr>

<th>Skill</th>

<th>Icon</th>

<th>Aksi</th>

</tr>

</thead>

<tbody id="skillTable">

</tbody>

</table>

<p id="message"></p>

</div>

</div>

<script>

const token = localStorage.getItem("token");

async function loadSkills(){

    const response = await fetch("/api/skills");

    const result = await response.json();

    const table = document.getElementById("skillTable");

    table.innerHTML = "";

    result.data.forEach(skill=>{

        table.innerHTML += `
        <tr>

            <td>${skill.nama_skill}</td>

            <td>${skill.icon_class || "-"}</td>

            <td>

                <button onclick="editSkill(${skill.id},'${skill.nama_skill}','${skill.icon_class || ""}')">

                Edit

                </button>

                <button onclick="deleteSkill(${skill.id})">

                Hapus

                </button>

            </td>

        </tr>
        `;

    });

}

loadSkills();

document.getElementById("skillForm").addEventListener("submit",async function(e){

    e.preventDefault();

    const id=document.getElementById("skill_id").value;

    const data={

        nama_skill:document.getElementById("nama_skill").value,

        icon_class:document.getElementById("icon_class").value

    };

    let url="/api/skills";

    let method="POST";

    if(id){

        url="/api/skills/"+id;

        method="PUT";

    }

    const response=await fetch(url,{

        method:method,

        headers:{

            "Content-Type":"application/json",

            "Authorization":"Bearer "+token

        },

        body:JSON.stringify(data)

    });

    const result = await response.json();

    const msg = document.getElementById("message");

    msg.innerHTML = result.message || result.error;

    msg.style.display = "block";

    setTimeout(()=>{
    msg.style.display = "none";
    },2500);

    document.getElementById("skillForm").reset();

    document.getElementById("skill_id").value="";

    loadSkills();

});

function editSkill(id,nama,icon){

    document.getElementById("skill_id").value=id;

    document.getElementById("nama_skill").value=nama;

    document.getElementById("icon_class").value=icon;

}

async function deleteSkill(id){

    if(!confirm("Yakin ingin menghapus skill ini?")) return;

    const response = await fetch("/api/skills/"+id,{

        method:"DELETE",

        headers:{
            "Authorization":"Bearer "+token
        }

    });

    const result = await response.json();

    const msg = document.getElementById("message");

    msg.innerHTML = result.message || result.error;

    msg.style.display = "block";

    setTimeout(()=>{
    msg.style.display = "none";
    },2500);

    loadSkills();

}

</script>

</body>
</html>
